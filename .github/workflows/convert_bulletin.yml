name: Convert Bulletin PDF to HTML

on:
  push:
    paths:
      - "**.pdf"

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install poppler-utils (required by pdf2image)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install easyocr pdf2image Pillow

      - name: Get today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Run OCR and generate HTML
        run: python convert_bulletin.py merged.pdf ${{ steps.date.outputs.today }}

      - name: Commit the generated HTML back to the repo
        run: |
          if ls bulletin-*.html 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bulletin-*.html
            git diff --staged --quiet || git commit -m "Auto-generate bulletin-${{ steps.date.outputs.today }}.html"
            git push
          else
            echo "No bulletin HTML file found — skipping commit."
            exit 1
          fi
