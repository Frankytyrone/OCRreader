name: Convert Bulletin PDF to HTML

on:
  push:
    paths:
      - "**.pdf"

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install poppler-utils (required by pdf2image)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install openai pdf2image Pillow

      - name: Get today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Find the PDF that was just uploaded
        id: find_pdf
        run: |
          CHANGED_PDF=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- "*.pdf" | head -n 1)
          if [ -z "$CHANGED_PDF" ]; then
            echo "No PDF found in this push. Exiting."
            exit 1
          fi
          echo "Found PDF: $CHANGED_PDF"
          echo "pdf_file=$CHANGED_PDF" >> "$GITHUB_OUTPUT"

      - name: Run OCR and generate HTML
        run: python convert_bulletin.py "${{ steps.find_pdf.outputs.pdf_file }}" ${{ steps.date.outputs.today }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit the generated HTML back to the repo
        run: |
          if ls bulletin-*.html 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bulletin-*.html
            git diff --staged --quiet || git commit -m "Auto-generate bulletin-${{ steps.date.outputs.today }}.html"
            git push
          else
            echo "No bulletin HTML file found — skipping commit."
            exit 1
          fi
