name: Convert Bulletin PDF to HTML

on:
  push:
    paths:
      - "**.pdf"

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install poppler-utils (required by pdf2image)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install openai pdf2image Pillow mistralai

      - name: Get today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Find the PDF that was just uploaded
        id: find_pdf
        run: |
          CHANGED_PDF=$(git diff --name-only --diff-filter=AM HEAD~1 HEAD -- "*.pdf" | head -n 1)
          if [ -z "$CHANGED_PDF" ]; then
            echo "No new PDF found in this push (may be a deletion or non-PDF push). Skipping."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Found PDF: $CHANGED_PDF"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "pdf_file=$CHANGED_PDF" >> "$GITHUB_OUTPUT"

      - name: Run OCR and generate HTML
        if: steps.find_pdf.outputs.skipped != 'true'
        run: python convert_bulletin.py "${{ steps.find_pdf.outputs.pdf_file }}" ${{ steps.date.outputs.today }}
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit the generated HTML back to the repo
        if: steps.find_pdf.outputs.skipped != 'true'
        run: |
          if ls bulletin-*.html 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # Remove any old bulletin HTML files tracked by git
            git ls-files bulletin-*.html | xargs -r git rm -f
            # Stage the newly generated HTML
            git add "bulletin-${{ steps.date.outputs.today }}.html"
            # Remove the processed PDF from the repo
            git rm -f "${{ steps.find_pdf.outputs.pdf_file }}" 2>/dev/null || true
            git diff --staged --quiet || git commit -m "Auto-generate bulletin-${{ steps.date.outputs.today }}.html"
            git pull --rebase
            git push
          else
            echo "No bulletin HTML file found — skipping commit."
          fi
